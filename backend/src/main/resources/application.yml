spring:
  profiles:
    active: sqlite  # 默认 SQLite，无需 Docker；Docker 部署时使用 SPRING_PROFILES_ACTIVE=docker
  application:
    name: modelrouter-backend
  datasource:
    url: jdbc:postgresql://localhost:5432/modelrouter
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    # false 时控制器返回 JPA 实体，Jackson 序列化可能在会话关闭后触发 LazyInitializationException → 500
    open-in-view: true

server:
  port: 20118
